apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agentos-mate
  labels:
    app.kubernetes.io/name: agentos-mate
    app.kubernetes.io/part-of: agentos
spec:
  replicas: 1
  serviceName: agentos-mate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: agentos-mate
  template:
    metadata:
      annotations:
        agentos.akua.dev/container: agentos
        agentos.akua.dev/herdr-session: agentos-mate
      labels:
        agentos.akua.dev/agent: mate
        app.kubernetes.io/name: agentos-mate
        app.kubernetes.io/part-of: agentos
    spec:
      serviceAccountName: agentos-mate
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: install-tools
          image: agentos:dev
          imagePullPolicy: Never
          workingDir: /opt/agentos/fleet
          command:
            - mise
          args:
            - install
            - --locked
            - node
            - kubectl
            - github:ogulcancelik/herdr
            - npm:@earendil-works/pi-coding-agent
          env: &runtime-environment
            - name: HOME
              value: /home/agent
            - name: AGENTOS_RELEASE_ROOT
              value: /opt/agentos
            - name: AGENTOS_AGENT_CWD
              value: /opt/agentos/fleet
            - name: AGENTOS_AGENT_NAME
              value: mate
            - name: AGENTOS_AGENT_ROLE
              value: mate
            - name: HERDR_CONFIG_PATH
              value: /home/agent/.config/herdr/config.toml
            - name: HERDR_SESSION
              value: agentos-mate
            - name: MISE_SYSTEM_CONFIG_FILE
              value: /etc/mise/config.toml
            - name: MISE_GITHUB_GITHUB_ATTESTATIONS
              value: "false"
            - name: MISE_GITHUB_SLSA
              value: "false"
            - name: MISE_TRUSTED_CONFIG_PATHS
              value: /opt/agentos
            - name: PI_CODING_AGENT_DIR
              value: /home/agent/.pi/agent
            - name: PI_OAUTH_CALLBACK_HOST
              value: 0.0.0.0
            - name: PATH
              value: /home/agent/.local/share/mise/shims:/home/agent/.local/bin:/usr/local/bin:/usr/bin:/bin
          securityContext: &container-security
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts: &home-volume
            - name: home
              mountPath: /home/agent
        - name: prepare-home
          image: agentos:dev
          imagePullPolicy: Never
          workingDir: /opt/agentos/fleet
          command:
            - mise
          args:
            - run
            - --skip-tools
            - mate:prepare
          env: *runtime-environment
          securityContext: *container-security
          volumeMounts: *home-volume
      containers:
        - name: agentos
          image: agentos:dev
          imagePullPolicy: Never
          workingDir: /opt/agentos/fleet
          command:
            - mise
          args:
            - run
            - --skip-tools
            - mate:run
          env: *runtime-environment
          securityContext: *container-security
          volumeMounts: *home-volume
          livenessProbe:
            exec:
              command:
                - mise
                - run
                - --skip-tools
                - mate:health
                - --
                - live
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - mise
                - run
                - --skip-tools
                - mate:health
                - --
                - ready
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: home
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
