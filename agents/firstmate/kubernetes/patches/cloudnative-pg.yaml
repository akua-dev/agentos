apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agentos-firstmate
spec:
  template:
    spec:
      initContainers:
        - name: install-tools
        - name: prepare-home
          env:
            - name: AGENTOS_PGPASS_SOURCE
              value: /var/run/agentos/postgres-credentials/pgpass
          volumeMounts:
            - name: postgres-pgpass
              mountPath: /var/run/agentos/postgres-credentials
              readOnly: true
      containers:
        - name: agentos
          env:
            - name: DATABASE_URL
              value: postgresql://agentos@agentos-postgres-rw:5432/agentos?sslmode=verify-full
            - name: NODE_EXTRA_CA_CERTS
              value: /var/run/agentos/postgres/ca.crt
            - name: PGPASSFILE
              value: /home/agent/.pgpass
            - name: PGSSLMODE
              value: verify-full
            - name: PGSSLROOTCERT
              value: /var/run/agentos/postgres/ca.crt
          volumeMounts:
            - name: postgres-ca
              mountPath: /var/run/agentos/postgres
              readOnly: true
      volumes:
        - name: postgres-ca
          secret:
            secretName: agentos-postgres-ca
            defaultMode: 288
            items:
              - key: ca.crt
                path: ca.crt
        - name: postgres-pgpass
          secret:
            secretName: agentos-postgres-app
            defaultMode: 288
            items:
              - key: pgpass
                path: pgpass
