apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agentos-firstmate
spec:
  template:
    spec:
      containers:
        - name: agentos
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: agentos-github-app
                  key: app-id
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: agentos-github-app
                  key: installation-id
            - name: GITHUB_APP_PRIVATE_KEY_FILE
              value: /var/run/secrets/agentos/github/private-key.pem
          volumeMounts:
            - name: github-app
              mountPath: /var/run/secrets/agentos/github
              readOnly: true
      volumes:
        - name: github-app
          secret:
            secretName: agentos-github-app
            defaultMode: 288
            items:
              - key: private-key.pem
                path: private-key.pem
