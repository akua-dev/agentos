apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
    app.kubernetes.io/component: ai-gateway
    app.kubernetes.io/part-of: agentos
spec:
  replicas: 1
  serviceName: ai-gateway
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway
        app.kubernetes.io/component: ai-gateway
        app.kubernetes.io/part-of: agentos
    spec:
      automountServiceAccountToken: false
      serviceAccountName: ai-gateway
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: state-permissions
          image: agentos:dev
          imagePullPolicy: Never
          command:
            - bun
          args:
            - -e
            - 'const { chmod, chown } = await import("node:fs/promises"); const path = "/var/lib/ai-gateway"; await chown(path, 0, 0); await chmod(path, 0o700); await chown(path, 1000, 1000);'
          volumeMounts:
            - name: state
              mountPath: /var/lib/ai-gateway
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
      containers:
        - name: ai-gateway
          image: agentos:dev
          imagePullPolicy: Never
          command:
            - ai-gateway
          args:
            - serve
          env:
            - name: HOME
              value: /var/lib/ai-gateway/home
            - name: MISE_DATA_DIR
              value: /opt/mise
            - name: MISE_SYSTEM_CONFIG_FILE
              value: /etc/mise/config.toml
            - name: MISE_TRUSTED_CONFIG_PATHS
              value: /opt/agentos
            - name: AI_GATEWAY_STATE_DIR
              value: /var/lib/ai-gateway
            - name: AI_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-gateway-client
                  key: token
          ports:
            - name: http
              protocol: TCP
              containerPort: 8787
          volumeMounts:
            - name: state
              mountPath: /var/lib/ai-gateway
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
