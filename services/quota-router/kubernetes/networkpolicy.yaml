apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: quota-router
  labels:
    app.kubernetes.io/name: quota-router
    app.kubernetes.io/part-of: agentos
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: quota-router
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: agentos
          podSelector:
            matchLabels:
              agentos.akua.dev/quota-router-client: "true"
      ports:
        - protocol: TCP
          port: 8787
