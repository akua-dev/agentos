apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quota-router
  labels:
    app.kubernetes.io/name: quota-router
    app.kubernetes.io/part-of: agentos
spec:
  replicas: 1
  serviceName: quota-router
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: quota-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: quota-router
        app.kubernetes.io/part-of: agentos
    spec:
      automountServiceAccountToken: false
      serviceAccountName: quota-router
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: quota-router
          image: agentos:dev
          imagePullPolicy: Never
          workingDir: /opt/agentos/services/quota-router
          command:
            - mise
          args:
            - run
            - --skip-tools
            - quota-router:serve
            - --
            - serve
          env:
            - name: HOME
              value: /var/lib/quota-router/home
            - name: MISE_DATA_DIR
              value: /opt/mise
            - name: MISE_SYSTEM_CONFIG_FILE
              value: /etc/mise/config.toml
            - name: MISE_TRUSTED_CONFIG_PATHS
              value: /opt/agentos
            - name: QUOTA_ROUTER_STATE_DIR
              value: /var/lib/quota-router
            - name: QUOTA_ROUTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: quota-router-client
                  key: token
          ports:
            - name: http
              protocol: TCP
              containerPort: 8787
          volumeMounts:
            - name: state
              mountPath: /var/lib/quota-router
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
