apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: agentos-postgres
  namespace: agentos
  labels:
    app.kubernetes.io/name: agentos-postgres
    app.kubernetes.io/part-of: agentos
spec:
  instances: 1
  enableSuperuserAccess: false
  bootstrap:
    initdb:
      database: agentos
      owner: agentos
      dataChecksums: true
  storage:
    size: 20Gi
